<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // 저장된 웹페이지 실행 방지 (로컬 파일 실행 차단)
      if (window.location.protocol === 'file:') {
        document.documentElement.innerHTML = `
          <div style="
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: sans-serif;
            background: #f8f9fa;
          ">
            <h1 style="color: #dc3545;">⚠️ 보안 경고</h1>
            <p style="font-size: 1.2rem; color: #343a40;">이 콘텐츠는 웹 브라우저의 "다른 이름으로 저장" 기능을 통해<br/>저장된 파일에서 열람할 수 없습니다.</p>
          </div>
        `;
        // 실행 중단
        throw new Error("Access denied: Local file execution is not allowed.");
      }
    </script>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dadoke - 프리미엄 교재 마켓플레이스</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
